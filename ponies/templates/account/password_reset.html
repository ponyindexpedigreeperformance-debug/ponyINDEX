{% extends "ponies/base.html" %}

{% block title %}Reset Password | PonyINDEX{% endblock %}

{% block extra_css %}
<style>

.auth-wrapper{
    max-width:420px;
    margin:auto;
    margin-top:60px;
}

.auth-card{
    background:#f8f9fa;
    border-radius:12px;
    padding:35px;
    box-shadow:0 6px 18px rgba(0,0,0,0.08);
}

.auth-title{
    font-size:36px;
    text-align:center;
    font-weight:bold;
    margin-bottom:5px;
}

.auth-subtitle{
    text-align:center;
    color:#555;
    margin-bottom:25px;
}

.auth-card input{
    width:100%;
    padding:10px;
    border-radius:8px;
    border:1px solid #ddd;
    margin-bottom:15px;
}

.auth-card input:focus{
    border-color:#0A8F8F;
    box-shadow:0 0 5px rgba(10,143,143,0.3);
    outline:none;
}

.btn-auth{
    width:100%;
    background:#0A8F8F;
    color:white;
    padding:12px;
    border:none;
    border-radius:8px;
    font-weight:600;
    cursor:pointer;
}

.btn-auth:hover{
    background:#097979;
}

.auth-links{
    text-align:center;
    margin-top:15px;
}

.auth-links a{
    color:#0A8F8F;
    text-decoration:none;
}

</style>
{% endblock %}

{% block content %}

<div class="auth-wrapper">
<div class="auth-card">

<h1 class="auth-title">Reset Password</h1>
<p class="auth-subtitle">Enter your email and we’ll send you a reset link</p>

<form method="post">
    {% csrf_token %}
    {{ form.as_p }}

    <button type="submit" class="btn-auth">Send Reset Link</button>
</form>

<div class="auth-links">
    <a href="{% url 'account_login' %}">Back to login</a>
</div>

</div>
</div>

{% endblock %}
