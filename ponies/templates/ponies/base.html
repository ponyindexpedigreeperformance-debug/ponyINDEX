<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>{% block title %}PonyINDEX{% endblock %}</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    font-family: "Avenir Next Condensed", sans-serif;
    background-color: #ffffff;
}

/* ================= NAVBAR ================= */

.navbar-custom {
    background-color: #DBF0EE;
}

.navbar-custom .nav-link {
    color: #000;
    font-weight: 500;
    transition: color 0.2s ease;
}

.navbar-custom .nav-link:hover {
    color: #00bfa5;
}

.navbar-brand {
    font-weight: 700;
}

/* ================= MAIN WRAPPER ================= */

.main-wrapper {
    max-width: 1400px;
    margin: 0 auto;
    padding: 0 40px;
}

/* ================= FOOTER ================= */

footer {
    background-color: #DBF0EE;
    padding: 25px 0;
    margin-top: 100px;
    text-align: center;
    font-size: 15px;
}
</style>

{% block extra_css %}{% endblock %}
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-light navbar-custom">
    <div class="container">

        <a class="navbar-brand" href="{% url 'ponies:index' %}">
            PonyINDEX
        </a>

        <button class="navbar-toggler" type="button"
                data-bs-toggle="collapse"
                data-bs-target="#mainNavbar">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse justify-content-end" id="mainNavbar">
            <ul class="navbar-nav">

                <li class="nav-item">
                    <a class="nav-link" href="{% url 'ponies:myindex' %}">
                        MyINDEX
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="{% url 'ponies:pony_search' %}">
                        Search
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="{% url 'ponies:stallions_at_stud' %}">
                        Stallions At Stud
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="{% url 'ponies:add_pony' %}">
                        Add Pony
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="{% url 'ponies:contact' %}">
                        Contact
                    </a>
                </li>

            </ul>
        </div>
    </div>
</nav>

<!-- CONTENT -->
<div class="main-wrapper">
    {% block content %}{% endblock %}
</div>

<!-- FOOTER -->
<footer>
    © 2026 PonyINDEX | All Rights Reserved
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
{% block extra_js %}{% endblock %}

</body>
</html>
